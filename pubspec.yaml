name: local_hub
description: Private local productivity app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Database
  floor: ^1.4.0

  # Navigation
  go_router: ^13.0.0

  # State management
  flutter_riverpod: ^2.5.1

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  file_selector: ^1.0.3 
  table_calendar: ^3.1.2
  sqflite: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code generation (Floor requires this)
  build_runner: ^2.4.9
  floor_generator: ^1.4.0

flutter:
  uses-material-design: true